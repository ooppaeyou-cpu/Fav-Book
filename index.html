<!DOCTYPE html>
<html lang="th">
<head>
    <style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #ffeef2;
    padding: 50px;
  }

  .btn {
    padding: 12px 20px;
    border: none;
    background: #ff6b81;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
  }

  .btn:hover {
    background: #ff4d6d;
  }

  /* popup */
  .popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
  }

  .popup-content {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
    max-width: 400px;
    margin: 100px auto;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }

  .popup-img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
  }

  .close {
    float: right;
    font-size: 22px;
    cursor: pointer;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
  }
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pages of Us </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Mali:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>


    <div class="book-container">
        <div class="book" id="book">
            
            <div class="page cover" id="page-0">
                <div class="page-content center-content">
                    <h1>Pages of Us</h1>
                    <h2>Happy Birthday Ai Auan</h2>
                    <div class="cover-image-container">
                        <img src="pic/cover.jpg" alt="Cover Photo" class="cover-img">
                    </div>
                    <button class="btn primary-btn" onclick="nextPage()">เปิดสมุดความรัก 📖</button>
                </div>
            </div>

            <div class="page" id="page-1">
                <div class="page-content">
                    <h2 class="handwriting">ถึงอ้วนนน</h2>
                    <p class="date-text">[4 พฤษภาคม 2007]</p>
                    <p class="message">
                        สุขสันต์วันเกิดนะอ้วน 🎂<br>
                        หนังสือเล่มนี้เค้าตั้งใจทำขึ้นมาแฮปปี้เบิร์ดเดย์อ้วน<br>
                        เค้าอยากอยู่เป็นของขวัญวันเกิดให้อ้วนทุกๆปีเลยย<br>
                        อยากกินชาบูกับอ้วนด้วย 😝
                    </p>
                    <img src="pic/LINE_ALBUM_1642569 BE_260429_22.jpg" alt="Cover Photo" class="cover-img">
                    <div class="page-footer">
                        <button class="btn nav-btn" onclick="prevPage()">หน้าก่อนหน้า</button>
                        <button class="btn nav-btn" onclick="nextPage()">หน้าถัดไป</button>
                    </div>
                </div>
            </div>

            <div class="page" id="page-2">
                <div class="page-content">
                    <h2 class="handwriting">ชาบูครั้งแรกของเรา 🍲</h2>
                    <div class="timeline">
                        <div class="timeline-item">
                            <span class="date">คู่รักชาบูสุดๆ</span>
                            <p>วันแรกที่ไปกินด้วยกันเค้าเขินมากกลัวกินเลอะ5555555</p>
                        </div>
                        <div class="timeline-item">
                            <span class="date">[จำประโยคนี้ได้ม้ะ]</span>
                            <p>อันนี้อร่อยนะเธอลองกินมั้ยเค้าแบ่งให้</p>
                            <p>ไม่เป็นไรเธอเดี๋ยวน้ำอันนั้นเค้ากินให้เธอเอาของเค้าไปกินดีกว่า</p>
                        </div>
                    </div>
                    <img src="pic/LINE_ALBUM_1642569 BE_260429_35.jpg" alt="First Date" class="story-img clickable-img">
                    <p>รูปนี้เค้าอ้วนตุ้บไม่เห็นคอเลยยย</p>
                    <img src="pic/LINE_ALBUM_1642569 BE_260429_33.jpg" alt="First Date" class="story-img clickable-img">

                    <div class="page-footer">
                        <button class="btn nav-btn" onclick="prevPage()">หน้าก่อนหน้า</button>
                        <button class="btn nav-btn" onclick="nextPage()">หน้าถัดไป</button>
                    </div>
                </div>
            </div>

            <div class="page" id="page-3">
                <div class="page-content center-content">
                    <h2 class="handwriting">Siam with auan 📸</h2>
                    <img src="pic/LINE_ALBUM_1642569 BE_260429_39.jpg" alt="Memory" class="story-img clickable-img polaroid">
                    <p class="caption">Photo boot so cute eiei</p>
                    <button class="btn" onclick="openPopup()">
  หิวอีกและ 🍗
</button>

<!-- popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">×</span>
    
    <p>KFC with youuu</p>
    
    <!-- เปลี่ยน path รูปตรงนี้ -->
    <img src="pic/LINE_ALBUM_1642569 BE_260429_12.jpg" alt="memory" class="popup-img">
  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>
                    <div class="page-footer absolute-bottom">
                        <button class="btn nav-btn" onclick="prevPage()">หน้าก่อนหน้า</button>
                        <button class="btn nav-btn" onclick="nextPage()">หน้าถัดไป</button>
                    </div>
                </div>
            </div>

            <div class="page" id="page-4">
                <div class="page-content">
                    <h2 class="handwriting">สิ่งที่รักในตัว [ชื่อแฟน] 💖</h2>
                    <ul class="love-list">
                        <li>✨ รอยยิ้มที่ทำให้โลกสดใส</li>
                        <li>🥺 ความใจดีและใส่ใจคนอื่นเสมอ</li>
                        <li>🍳 ฝีมือทำ [ชื่ออาหาร] ที่อร่อยที่สุด</li>
                        <li>🧸 ความน่ารักตอนที่เธองอแง</li>
                    </ul>
                    
                    <hr class="divider">
                    
                    <div class="secret-section">
                        <h3>ข้อความลับ 🔒</h3>
                        <p>ใส่รหัสผ่าน (วันครบรอบของเรา DDMM):</p>
                        <input type="password" id="secret-input" placeholder="เช่น 1402">
                        <button class="btn nav-btn" onclick="checkSecret()">ปลดล็อค</button>
                        <p id="secret-message" class="hidden-message">ขอบคุณที่อยู่เคียงข้างกันมาตลอดนะ รักเธอที่สุดเลย! 👩‍❤️‍👨</p>
                    </div>

                    <div class="page-footer">
                        <button class="btn nav-btn" onclick="prevPage()">หน้าก่อนหน้า</button>
                        <button class="btn nav-btn" onclick="nextPage()">หน้าถัดไป</button>
                    </div>
                </div>
            </div>

            <div class="page" id="page-5">
                <div class="page-content center-content">
                    <h2 class="handwriting glowing-text">บทต่อไปของเรา 📖</h2>
                    <p class="message">
                        ไม่ว่าอนาคตจะเป็นยังไง ขอแค่มีเราจับมือกันแบบนี้ไปเรื่อยๆ ก็พอ<br><br>
                        <strong>"I love you forever"</strong>
                    </p>
                    <p class="signature">ลงชื่อ... [ชื่อของคุณ] ❤️<br>[วันที่]</p>
                    
                    <button class="btn primary-btn mt-2" onclick="resetBook()">อ่านอีกครั้ง 🔄</button>
                    
                    <div class="qr-section">
                        <p class="small-text">สแกนรับของขวัญ 🎁</p>
                        <img src="https://via.placeholder.com/100x100/000000/ffffff?text=QR" alt="Gift QR">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="image-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-img">
    </div>

    <div id="hearts-container"></div>

    <script src="script.js"></script>
</body>
</html>
